<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Seoul Watch Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="sidebar-logo">
                    <img src="../other/로고/로고.png" alt="Seoul Watch">
                </a>
                <span class="sidebar-badge">ADMIN</span>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="products.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    <span>Products</span>
                </a>
                <a href="product-edit.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 4v16m8-8H4"/>
                    </svg>
                    <span>Add Product</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                    <span>View Site</span>
                </a>
                <button onclick="logout()" class="nav-item logout-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                    <p class="header-subtitle">Welcome to Seoul Watch Admin</p>
                </div>
                <div class="header-right">
                    <a href="product-edit.html" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 4v16m8-8H4"/>
                        </svg>
                        Add Product
                    </a>
                </div>
            </header>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon total">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Total Products</span>
                        <span class="stat-value" id="statTotal">-</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Active Products</span>
                        <span class="stat-value" id="statActive">-</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon archive">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Archived (Sold)</span>
                        <span class="stat-value" id="statArchive">-</span>
                    </div>
                </div>
            </div>

            <!-- Brand Distribution -->
            <div class="content-section">
                <div class="section-header">
                    <h2>Brand Distribution</h2>
                </div>
                <div class="brand-chart" id="brandChart">
                    <div class="loading-spinner"></div>
                </div>
            </div>

            <!-- Recent Products -->
            <div class="content-section">
                <div class="section-header">
                    <h2>Recent Products</h2>
                    <a href="products.html" class="btn-link">View All</a>
                </div>
                <div class="recent-products" id="recentProducts">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
    <script>
        // Check authentication
        checkAuth();

        // Load dashboard data
        loadDashboard();

        async function loadDashboard() {
            try {
                const data = await apiRequest('/seoulwatch/api/stats');

                // Update stats
                document.getElementById('statTotal').textContent = data.total.toLocaleString();
                document.getElementById('statActive').textContent = data.active.toLocaleString();
                document.getElementById('statArchive').textContent = data.archive.toLocaleString();

                // Render brand chart
                renderBrandChart(data.brands);

                // Render recent products
                renderRecentProducts(data.recent);

            } catch (error) {
                console.error('Failed to load dashboard:', error);
                showToast('Failed to load dashboard data', 'error');
            }
        }

        function renderBrandChart(brands) {
            const container = document.getElementById('brandChart');
            const entries = Object.entries(brands);

            if (entries.length === 0) {
                container.innerHTML = '<p class="empty-state">No products yet</p>';
                return;
            }

            const maxCount = Math.max(...entries.map(([, count]) => count));

            let html = '<div class="brand-bars">';
            entries.forEach(([brand, count]) => {
                const width = (count / maxCount) * 100;
                html += `
                    <div class="brand-bar-item">
                        <div class="brand-bar-label">
                            <span class="brand-name">${brand}</span>
                            <span class="brand-count">${count}</span>
                        </div>
                        <div class="brand-bar-track">
                            <div class="brand-bar-fill" style="width: ${width}%"></div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            container.innerHTML = html;
        }

        function renderRecentProducts(products) {
            const container = document.getElementById('recentProducts');

            if (products.length === 0) {
                container.innerHTML = '<p class="empty-state">No products yet</p>';
                return;
            }

            let html = '<div class="recent-grid">';
            products.forEach(product => {
                const statusClass = product.status === 'archive' ? 'sold' : 'active';
                const statusText = product.status === 'archive' ? 'SOLD' : 'Active';

                html += `
                    <a href="product-edit.html?id=${product.id}" class="recent-item">
                        <div class="recent-image">
                            <img src="${product.image || ''}" alt="${product.name}">
                        </div>
                        <div class="recent-info">
                            <span class="recent-brand">${product.brand}</span>
                            <h4 class="recent-name">${product.name}</h4>
                            <div class="recent-meta">
                                <span class="recent-price">${formatPrice(product.price)}</span>
                                <span class="recent-status ${statusClass}">${statusText}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
            html += '</div>';

            container.innerHTML = html;
        }
    </script>
</body>
</html>
