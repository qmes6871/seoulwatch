<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Seoul Watch Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="sidebar-logo">
                    <img src="../other/로고/로고.png" alt="Seoul Watch">
                </a>
                <span class="sidebar-badge">ADMIN</span>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="products.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    <span>Products</span>
                </a>
                <a href="product-edit.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 4v16m8-8H4"/>
                    </svg>
                    <span>Add Product</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                    <span>View Site</span>
                </a>
                <button onclick="logout()" class="nav-item logout-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1>Products</h1>
                    <p class="header-subtitle">Manage your product inventory</p>
                </div>
                <div class="header-right">
                    <a href="product-edit.html" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 4v16m8-8H4"/>
                        </svg>
                        Add Product
                    </a>
                </div>
            </header>

            <!-- Filters -->
            <div class="filters-bar">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search products...">
                </div>

                <div class="filter-group">
                    <select id="brandFilter" class="filter-select">
                        <option value="all">All Brands</option>
                    </select>
                    <select id="statusFilter" class="filter-select">
                        <option value="all">All Status</option>
                        <option value="active">Active</option>
                        <option value="archive">Archived</option>
                    </select>
                    <select id="sortFilter" class="filter-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="price_high">Price: High to Low</option>
                        <option value="price_low">Price: Low to High</option>
                        <option value="name">Name A-Z</option>
                    </select>
                </div>
            </div>

            <!-- Bulk Actions -->
            <div class="bulk-actions" id="bulkActions" style="display: none;">
                <span class="selected-count"><span id="selectedCount">0</span> selected</span>
                <div class="bulk-btns">
                    <button onclick="bulkSetActive()" class="btn-outline success">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 13l4 4L19 7"/>
                        </svg>
                        Set Active
                    </button>
                    <button onclick="bulkSetArchive()" class="btn-outline warning">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                        Archive
                    </button>
                    <button onclick="bulkDelete()" class="btn-outline danger">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        Delete
                    </button>
                </div>
            </div>

            <!-- Products Table -->
            <div class="table-container">
                <table class="products-table">
                    <thead>
                        <tr>
                            <th class="checkbox-col">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            </th>
                            <th class="image-col">Image</th>
                            <th>Product</th>
                            <th>Brand</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th class="actions-col">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr>
                            <td colspan="7" class="loading-cell">
                                <div class="loading-spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-overlay" onclick="closeDeleteModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Delete Product</h3>
                <button class="modal-close" onclick="closeDeleteModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this product?</p>
                <p class="modal-warning">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button onclick="closeDeleteModal()" class="btn-secondary">Cancel</button>
                <button onclick="confirmDelete()" class="btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        // Check authentication
        checkAuth();

        // State
        let currentPage = 1;
        let totalPages = 1;
        let selectedProducts = new Set();
        let productToDelete = null;

        // Load initial data
        loadBrands();
        loadProducts();

        // Event listeners - reset to page 1 when filters change
        document.getElementById('searchInput').addEventListener('input', debounce(() => {
            currentPage = 1;
            loadProducts();
        }, 300));
        document.getElementById('brandFilter').addEventListener('change', () => {
            currentPage = 1;
            loadProducts();
        });
        document.getElementById('statusFilter').addEventListener('change', () => {
            currentPage = 1;
            loadProducts();
        });
        document.getElementById('sortFilter').addEventListener('change', () => {
            currentPage = 1;
            loadProducts();
        });

        async function loadBrands() {
            try {
                const brands = await apiRequest('/seoulwatch/api/brands');
                const select = document.getElementById('brandFilter');

                brands.forEach(brand => {
                    const option = document.createElement('option');
                    option.value = brand.toLowerCase();
                    option.textContent = brand;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load brands:', error);
            }
        }

        async function loadProducts() {
            const search = document.getElementById('searchInput').value;
            const brand = document.getElementById('brandFilter').value;
            const status = document.getElementById('statusFilter').value;
            const sort = document.getElementById('sortFilter').value;

            const params = new URLSearchParams({
                page: currentPage,
                limit: 20,
                search,
                brand,
                status,
                sort
            });

            try {
                const data = await apiRequest(`/seoulwatch/api/products?${params}`);
                renderProducts(data.products);
                renderPagination(data.page, data.totalPages, data.total);
            } catch (error) {
                console.error('Failed to load products:', error);
                showToast('Failed to load products', 'error');
            }
        }

        function renderProducts(products) {
            const tbody = document.getElementById('productsTableBody');

            if (products.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-cell">
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                                </svg>
                                <p>No products found</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = products.map(product => {
                const statusClass = product.status === 'archive' ? 'sold' : 'active';
                const statusText = product.status === 'archive' ? 'SOLD' : 'Active';
                const isChecked = selectedProducts.has(product.id) ? 'checked' : '';

                return `
                    <tr data-id="${product.id}">
                        <td class="checkbox-col">
                            <input type="checkbox" ${isChecked} onchange="toggleSelect('${product.id}')">
                        </td>
                        <td class="image-col">
                            <div class="product-thumbnail">
                                <img src="${product.image || ''}" alt="${product.name}">
                            </div>
                        </td>
                        <td>
                            <div class="product-cell">
                                <span class="product-name">${product.name}</span>
                                <span class="product-sku">SKU: ${product.sku}</span>
                            </div>
                        </td>
                        <td>
                            <span class="brand-badge">${product.brand}</span>
                        </td>
                        <td class="price-col">${formatPrice(product.price)}</td>
                        <td>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </td>
                        <td class="actions-col">
                            <div class="action-btns">
                                <a href="product-edit.html?id=${product.id}" class="action-btn edit" title="Edit">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </a>
                                <button onclick="toggleStatus('${product.id}', '${product.status}')" class="action-btn toggle" title="${product.status === 'active' ? 'Archive' : 'Activate'}">
                                    ${product.status === 'active' ?
                                        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                            <path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                                        </svg>` :
                                        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>`
                                    }
                                </button>
                                <button onclick="showDeleteModal('${product.id}')" class="action-btn delete" title="Delete">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination(page, total, totalItems) {
            const container = document.getElementById('pagination');
            totalPages = total;

            if (total <= 1) {
                container.innerHTML = `<span class="pagination-info">Showing ${totalItems} products</span>`;
                return;
            }

            let html = `<span class="pagination-info">Showing page ${page} of ${total} (${totalItems} products)</span>`;
            html += '<div class="pagination-btns">';

            // Previous
            html += `<button onclick="goToPage(${page - 1})" class="pagination-btn" ${page === 1 ? 'disabled' : ''}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>`;

            // Page numbers
            for (let i = 1; i <= total; i++) {
                if (i === 1 || i === total || (i >= page - 2 && i <= page + 2)) {
                    html += `<button onclick="goToPage(${i})" class="pagination-btn ${i === page ? 'active' : ''}">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += '<span class="pagination-ellipsis">...</span>';
                }
            }

            // Next
            html += `<button onclick="goToPage(${page + 1})" class="pagination-btn" ${page === total ? 'disabled' : ''}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>`;

            html += '</div>';
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadProducts();
        }

        // Selection handling
        function toggleSelect(id) {
            if (selectedProducts.has(id)) {
                selectedProducts.delete(id);
            } else {
                selectedProducts.add(id);
            }
            updateBulkActions();
        }

        function toggleSelectAll() {
            const checkbox = document.getElementById('selectAll');
            const rows = document.querySelectorAll('#productsTableBody tr[data-id]');

            rows.forEach(row => {
                const id = row.dataset.id;
                const cb = row.querySelector('input[type="checkbox"]');
                if (checkbox.checked) {
                    selectedProducts.add(id);
                    cb.checked = true;
                } else {
                    selectedProducts.delete(id);
                    cb.checked = false;
                }
            });

            updateBulkActions();
        }

        function updateBulkActions() {
            const container = document.getElementById('bulkActions');
            const countSpan = document.getElementById('selectedCount');

            if (selectedProducts.size > 0) {
                container.style.display = 'flex';
                countSpan.textContent = selectedProducts.size;
            } else {
                container.style.display = 'none';
            }
        }

        // Bulk actions
        async function bulkSetActive() {
            await bulkUpdateStatus('active');
        }

        async function bulkSetArchive() {
            await bulkUpdateStatus('archive');
        }

        async function bulkUpdateStatus(status) {
            const ids = Array.from(selectedProducts);
            if (ids.length === 0) return;

            try {
                await apiRequest('/seoulwatch/api/products/bulk-status', {
                    method: 'POST',
                    body: JSON.stringify({ ids, status })
                });

                showToast(`${ids.length} products updated`, 'success');
                selectedProducts.clear();
                updateBulkActions();
                loadProducts();
            } catch (error) {
                showToast('Failed to update products', 'error');
            }
        }

        async function bulkDelete() {
            const ids = Array.from(selectedProducts);
            if (ids.length === 0) return;

            if (!confirm(`Delete ${ids.length} products? This cannot be undone.`)) {
                return;
            }

            try {
                await apiRequest('/seoulwatch/api/products/bulk-delete', {
                    method: 'POST',
                    body: JSON.stringify({ ids })
                });

                showToast(`${ids.length} products deleted`, 'success');
                selectedProducts.clear();
                updateBulkActions();
                loadProducts();
            } catch (error) {
                showToast('Failed to delete products', 'error');
            }
        }

        // Status toggle
        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'archive' : 'active';

            try {
                await apiRequest(`/seoulwatch/api/products/${id}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: newStatus })
                });

                showToast('Status updated', 'success');
                loadProducts();
            } catch (error) {
                showToast('Failed to update status', 'error');
            }
        }

        // Delete modal
        function showDeleteModal(id) {
            productToDelete = id;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            productToDelete = null;
            document.getElementById('deleteModal').classList.remove('active');
        }

        async function confirmDelete() {
            if (!productToDelete) return;

            try {
                await apiRequest(`/seoulwatch/api/products/${productToDelete}`, {
                    method: 'DELETE'
                });

                showToast('Product deleted', 'success');
                closeDeleteModal();
                loadProducts();
            } catch (error) {
                showToast('Failed to delete product', 'error');
            }
        }
    </script>
</body>
</html>
